<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Inscripción</title>
</head>
<body>

<h1>Editar Inscripción</h1>

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Guardar cambios</button>

</form>

<a href="{% url 'listar_inscripciones' %}">Volver al listado</a>

</body>
</html>
